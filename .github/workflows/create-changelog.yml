name: Create Changelog

on:
  push:
    branches: [ master ]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Changelog for Developers
        run: ./gradlew gitChangelog

      - name: Generate Changelog for Consumers
        run: ./gradlew gitChangelogConsumer

      - name: Commit Changelogs
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add CHANGELOG.md
          git add CHANGELOG_CONSUMER.md
          git commit -m "Update changelog for version ${GITHUB_REF#refs/tags/v}"
          git push

      - name: Push changes
        run: git push origin HEAD:master
